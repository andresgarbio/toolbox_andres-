<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Toolbox</title>
<style>
  :root{
    --ink:#10141b;
    --surface:#1a212c;
    --well:#0c1017;
    --line:#283140;
    --line-soft:#1f2733;
    --text:#e7eef6;
    --muted:#8d9aac;
    --faint:#5d6877;
    --accent:#54d6a4;
    --accent-dim:#1d3a31;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box}
  body{
    margin:0; min-height:100vh; background:var(--ink); color:var(--text);
    font-family:var(--sans); line-height:1.5; -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column;
  }
  ::selection{background:var(--accent); color:#06120d}

  .wrap{max-width:1040px; margin:0 auto; padding:64px 22px 40px; width:100%}

  .eyebrow{
    font-family:var(--mono); font-size:11.5px; letter-spacing:.22em;
    text-transform:uppercase; color:var(--accent); margin-bottom:18px;
  }
  h1{
    font-size:clamp(40px, 8vw, 76px); line-height:.98; margin:0;
    font-weight:680; letter-spacing:-.03em;
  }
  h1 .dot{color:var(--accent)}
  .lede{
    color:var(--muted); font-size:16.5px; max-width:46ch; margin:18px 0 0;
  }

  .rule{
    display:flex; align-items:center; gap:14px; margin:44px 0 22px;
    font-family:var(--mono); font-size:11px; letter-spacing:.16em;
    text-transform:uppercase; color:var(--faint);
  }
  .rule::after{content:""; flex:1; height:1px; background:var(--line)}

  .grid{display:grid; gap:14px; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr))}

  .room{
    display:flex; flex-direction:column; text-decoration:none; color:inherit;
    background:var(--surface); border:1px solid var(--line-soft);
    border-radius:13px; padding:18px 18px 16px; transition:border-color .14s, transform .14s;
  }
  a.room:hover{border-color:var(--accent); transform:translateY(-2px)}
  a.room:focus-visible{outline:2px solid var(--accent); outline-offset:2px}
  .room.soon{opacity:.62; cursor:default}

  .room-top{display:flex; align-items:center; gap:10px; margin-bottom:14px}
  .lang{font-size:21px; font-weight:640; letter-spacing:-.015em}
  .status{
    margin-left:auto; font-family:var(--mono); font-size:10px; letter-spacing:.12em;
    text-transform:uppercase; padding:3px 8px; border-radius:5px;
  }
  .status.ready{color:var(--accent); background:var(--accent-dim)}
  .status.soon{color:var(--faint); border:1px solid var(--line)}

  .snippet{
    font-family:var(--mono); font-size:12px; color:#9fb0c2;
    background:var(--well); border:1px solid var(--line-soft); border-radius:8px;
    padding:9px 11px; margin:0 0 12px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;
  }
  .desc{color:var(--muted); font-size:13.5px; margin:0}

  .enter{
    margin-top:14px; font-family:var(--mono); font-size:12px; letter-spacing:.06em;
    color:var(--accent);
  }
  .room.soon .enter{color:var(--faint)}

  footer{
    margin-top:auto; padding:26px 22px; text-align:center;
    font-family:var(--mono); font-size:11px; letter-spacing:.06em; color:var(--faint);
  }
  footer a{color:var(--muted); text-decoration:none}
  footer a:hover{color:var(--text)}

  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Reference Toolbox</div>
  <h1>The Dojo<span class="dot">.</span></h1>
  <p class="lede">Per-language reference rooms built for looking things up fast under a running clock. Search the symptom, copy the snippet, get back to the problem.</p>

  <div class="rule">Rooms</div>
  <div class="grid" id="grid"></div>
</div>

<footer>
  built for speed &middot; <a href="https://github.com/andresgarbio/toolbox_andres-">source on github</a>
</footer>

<script>
const ROOMS = [
  {lang:"Python", status:"ready", href:"python/",
   snip:"from collections import deque, Counter",
   desc:"Patterns, graphs, structures, and gotchas for timed assessments."},
  {lang:"C++", status:"soon",
   snip:"#include <bits/stdc++.h>",
   desc:"STL idioms, fast IO, and competitive templates."},
  {lang:"JavaScript", status:"soon",
   snip:"const seen = new Map();",
   desc:"Array methods, async patterns, and quick DOM refs."},
  {lang:"SQL", status:"soon",
   snip:"SELECT * FROM t WHERE id = ?;",
   desc:"Joins, window functions, and query patterns."},
  {lang:"Bash", status:"soon",
   snip:"while read -r line; do ... done",
   desc:"Text processing, loops, and one-liners."},
];

const grid = document.getElementById('grid');
ROOMS.forEach(r => {
  const ready = r.status === "ready";
  const el = document.createElement(ready ? 'a' : 'div');
  el.className = 'room' + (ready ? '' : ' soon');
  if(ready) el.href = r.href;

  const code = document.createElement('div');
  code.className = 'snippet';
  code.textContent = r.snip;          // textContent so < > render literally

  el.innerHTML =
    '<div class="room-top">' +
      '<span class="lang"></span>' +
      '<span class="status ' + r.status + '">' + (ready ? 'ready' : 'soon') + '</span>' +
    '</div>';
  el.querySelector('.lang').textContent = r.lang;
  el.appendChild(code);

  const d = document.createElement('p');
  d.className = 'desc'; d.textContent = r.desc;
  el.appendChild(d);

  const enter = document.createElement('div');
  enter.className = 'enter';
  enter.textContent = ready ? 'enter \u2192' : 'in progress';
  el.appendChild(enter);

  grid.appendChild(el);
});
</script>
</body>
</html>
